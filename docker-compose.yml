services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-comand_io_dev}
      MYSQL_DATABASE: restaurante
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Ficheiros .sql aqui correm só na 1.ª inicialização do volume (dados vazios).
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      SQLALCHEMY_DATABASE_URI: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-comand_io_dev}@db:3306/restaurante
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
