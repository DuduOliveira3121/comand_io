<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Admin - Cardápio</title>

<link rel="stylesheet" href="/style.css">

</head>

<body>

<div class="container">

    <header>
        <h1>Admin - Cardápio</h1>
    </header>

    <section class="card">

        <h2>Criar produto</h2>

        <div class="form-grid">

            <input id="nome" placeholder="Nome do produto">
            <input id="descricao" placeholder="Descrição">
            <input id="preco" placeholder="Preço">

        </div>

        <button class="btn-primary" onclick="criarProduto()">
            Criar Produto
        </button>

    </section>

    <section class="card">

        <h2>Produtos cadastrados</h2>

        <div id="lista_produtos" class="produtos-grid"></div>

    </section>

</div>

<script src="/app.js"></script>

</body>
</html>
