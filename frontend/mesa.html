<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mesa</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <header>
        <h1 id="titulo">Mesa</h1>
    </header>

    <div class="layout">

        <!-- CARDÁPIO -->
        <section class="cardapio">

            <h2>Cardápio</h2>

            <div id="produtos" class="produtos-grid"></div>

        </section>

        <!-- PEDIDO -->
        <section class="pedido">

            <h2>Seu pedido</h2>

            <div id="pedido" class="pedido-itens"></div>

            <div class="total">

                <h3 id="total">Total: R$ 0</h3>

                <button class="btn-fechar" onclick="fecharPedido()">
                    Fechar conta
                </button>

            </div>

        </section>

    </div>

</div>

<script src="mesa.js"></script>

</body>
</html>
