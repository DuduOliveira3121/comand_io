<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mesa</title>

<link rel="stylesheet" href="/style.css">

</head>

<body>

<div class="container">

    <header>
        <h1 id="titulo">Mesa</h1>
    </header>

    <div class="layout">

        <!-- CARDÁPIO -->
        <section class="cardapio">

            <h2>Cardápio</h2>

            <div id="produtos" class="produtos-grid"></div>

        </section>

        <!-- PEDIDO -->
        <section class="pedido">

            <h2>Seu pedido</h2>

            <div id="pedido" class="pedido-itens"></div>

            <div class="total">

                <h3 id="total">Total: R$ 0</h3>

                <button class="btn-fechar" onclick="fecharPedido()">
                    Fechar conta
                </button>

            </div>

        </section>

    </div>

</div>

<!-- Modal para solicitar email -->
<div id="modal-email" class="modal-overlay">
    <div class="modal-content">
        <h2>Abrir Mesa</h2>
        <p>Para começar a fazer pedidos, informe seu email:</p>
        
        <input 
            type="email" 
            id="email-input" 
            placeholder="seu@email.com"
            class="email-input"
        >
        
        <div class="modal-buttons">
            <button class="btn-confirmar" onclick="confirmarEmail()">
                Confirmar
            </button>
            <button class="btn-cancelar" onclick="cancelarEmail()">
                Cancelar
            </button>
        </div>
        
        <div id="erro-email" class="erro-mensagem"></div>
    </div>
</div>

<script src="/mesa.js"></script>

</body>
</html>
